<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Phone Snapshot Cam</title>
  <style>
    body { margin:0; background:#000; color:#eee; font-family:sans-serif; text-align:center; }
    img { width:100%; max-width:800px; display:block; margin:20px auto; background:#222; }
    h1 { margin:20px; }
    #status { color:#f90; }
  </style>
</head>
<body>
  <h1>Live Snapshots (~every 30s)</h1>
  <img id="cam" src="data:image/jpeg;base64," alt="Live snapshot" onerror="this.src='data:image/jpeg;base64,';">
  <p id="status">Loading latest snapshot...</p>

  <script>
    const IMG_ELEMENT = document.getElementById('cam');
    const STATUS      = document.getElementById('status');

    // Your Apps Script web app URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_APPS_SCRIPT_ID/exec';

    function updateImage() {
      fetch(SCRIPT_URL)
        .then(r => {
          if (!r.ok) throw new Error('Fetch failed');
          return r.text();
        })
        .then(base64Data => {
          if (base64Data.startsWith('data:image')) {
            IMG_ELEMENT.src = base64Data + '?t=' + Date.now();  // cache bust
            STATUS.textContent = 'Updated: ' + new Date().toLocaleTimeString();
          } else {
            STATUS.textContent = 'No valid image yet';
          }
        })
        .catch(err => {
          STATUS.textContent = 'Error loading: ' + err.message;
        });
    }

    updateImage();                    // immediate
    setInterval(updateImage, 35000);  // poll every ~35s
  </script>
</body>
</html>
