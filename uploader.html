<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Snapshot → Drive Overwrite</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: #111; color: #eee; }
    video, img { max-width: 90%; margin: 10px auto; display: block; border: 2px solid #444; }
    button { padding: 12px 24px; font-size: 1.1em; margin: 10px; }
    #status { color: #0f0; }
  </style>
</head>
<body>
  <h2>Old Phone → Live Snapshot Uploader</h2>
  <p>Keep this tab open & phone charging. Updates every <span id="interval">30</span> seconds.</p>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <img id="preview" alt="Latest captured">

  <div>
    <form id="hiddenForm" action="https://script.google.com/macros/s/AKfycbyEqCAvSf23Y1bxwtH5DJhlz24dLPg8--GqfszfMsHPZT8NUAERoiOky9AwK-sgSm6CBw/exec" method="POST" style="display:none;">
     <input type="hidden" name="image" id="hiddenImage">
</form>
    <label>Interval (seconds): </label>
    <input type="number" id="sec" value="30" min="10" max="300" style="width:80px;">
    <button onclick="updateInterval()">Apply</button>
  </div>

  <p id="status">Starting camera...</p>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const preview = document.getElementById('preview');
    const status = document.getElementById('status');

    const SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_APPS_SCRIPT_ID/exec';  // ← Paste your web app URL here

    let intervalMs = 30000;   // default 30s
    let timer = null;

    // Start camera (rear by default)
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment' }   // 'user' for front camera
    })
    .then(stream => {
      video.srcObject = stream;
      status.textContent = 'Camera ready. Capturing...';
      captureAndUpload();          // first capture
      timer = setInterval(captureAndUpload, intervalMs);
    })
    .catch(err => {
      status.textContent = 'Camera error: ' + err.message;
      status.style.color = '#f44';
    });

    function captureAndUpload() {
  if (video.videoWidth === 0) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  // overlay timestamp (optional)
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
  ctx.fillStyle = '#fff';
  ctx.font = '16px Arial';
  ctx.fillText(new Date().toLocaleString(), 10, canvas.height - 15);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.65);
  preview.src = dataUrl;

  document.getElementById('hiddenImage').value = dataUrl;
  document.getElementById('hiddenForm').submit();  // sends POST, no CORS issue

  status.textContent = 'Sending snapshot...';
}

    function updateInterval() {
      const sec = parseInt(document.getElementById('sec').value);
      if (sec >= 10 && sec <= 300) {
        intervalMs = sec * 1000;
        clearInterval(timer);
        timer = setInterval(captureAndUpload, intervalMs);
        document.getElementById('interval').textContent = sec;
        status.textContent = `Interval updated to ${sec}s`;
      }
    }
  </script>
</body>
</html>
